# Prometheus configuration for Nexus microservices monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8001']
    metrics_path: '/metrics'

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8002']
    metrics_path: '/metrics'

  - job_name: 'role-service'
    static_configs:
      - targets: ['role-service:8003']
    metrics_path: '/metrics'

  - job_name: 'audit-service'
    static_configs:
      - targets: ['audit-service:8004']
    metrics_path: '/metrics'

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8005']
    metrics_path: '/metrics'